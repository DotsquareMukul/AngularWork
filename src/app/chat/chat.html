<!-- chat.component.html -->
<div class="chat-container">
  <div class="chat-messages">
    @for (message of messages(); track message.id) {
      <div
        class="message"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'"
      >
        <div class="message-content">
          {{ message.content }}
          @if (message.streaming) {
            <span class="cursor">▊</span>
          }
        </div>
      </div>
    }
    <div #scrollAnchor></div>
  </div>

  <div class="chat-input-row">
    <input
      #fileInput
      type="file"
      accept="application/pdf"
      hidden
      (change)="onFileSelected($event)"
    />

    <mat-form-field appearance="outline" class="chat-input">
      @if (store.attachedFile(); as file) {
        <div class="file-chip">
          <span class="file-name">{{ file.name }}</span>
          <mat-icon (click)="store.clearAttachedFile()">close</mat-icon>
        </div>
      }
      @if (store.isUploadingFile()) {
        <mat-spinner diameter="16"></mat-spinner>
      }
      <button
        mat-icon-button
        matPrefix
        matTooltip="Attach PDF"
        type="button"
        (click)="triggerFilePicker()"
        [disabled]="isStreaming()"
      >
        <mat-icon>attach_file</mat-icon>
      </button>

      <input
        matInput
        placeholder="Type a message or attach a PDF..."
        [ngModel]="draft()"
        (ngModelChange)="draft.set($event)"
        (keydown)="onEnter($event)"
        [disabled]="isStreaming()"
      />
    </mat-form-field>

    <button mat-icon-button color="primary" (click)="send()" [disabled]="isBusy() || !canSend()">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
