      <mat-icon>dashboard</mat-icon>
      <span class="brand"> Ai App</span>
    </div>

    <mat-nav-list>

        <span matListItemTitle>Customers</span>
      </a>
      <a
        mat-list-item
        routerLink="/order-list"
        routerLinkActive="active-link"
        (click)="isMobile() && sidenav.close()"

      <a
        mat-list-item
        routerLink="/chat"
        routerLinkActive="active-link"
        (click)="isMobile() && sidenav.close()"
        ><mat-icon matListItemIcon>chat</mat-icon>
        <span matListItemTitle>Ai Chat</span>
      </a>
      <a
        mat-list-item
        routerLink="/documnetQuery"
        routerLinkActive="active-link"
        (click)="isMobile() && sidenav.close()"
        ><mat-icon matListItemIcon>find_in_page</mat-icon>
        <span matListItemTitle> DocumnetQuery</span>
      </a>
      <a
        mat-list-item
        routerLink="/document-add"
        routerLinkActive="active-link"
        (click)="isMobile() && sidenav.close()"
        ><mat-icon matListItemIcon>add</mat-icon>
        <span matListItemTitle>Add Document</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-stroked-button color="warn" (click)="logOut()">
        <mat-icon>logout</mat-icon>
        Log Out
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="header">
      <!-- Hamburger — only visible on mobile -->
      @if (isMobile()) {
        <button mat-icon-button (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <span class="app-title">{{ title() }}</span>
      <span class="spacer"></span>
