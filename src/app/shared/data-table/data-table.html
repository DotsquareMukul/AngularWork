<div class="table-wrapper mat-elevation-z2">
  <table mat-table [dataSource]="pagedData" matSort (matSortChange)="onSort($event)">
    <!-- Dynamic columns -->
    @for (col of columns; track col.key) {
      <ng-container [matColumnDef]="col.key">
        <th
          mat-header-cell
          *matHeaderCellDef
          [mat-sort-header]="col.sortable ? col.key : ''"
          [disabled]="!col.sortable"
        >
          {{ col.label }}
        </th>
        <td mat-cell *matCellDef="let row">{{ row[col.key] }}</td>
      </ng-container>
    }

    <!-- Actions column -->
    @if (actions.length) {
      <ng-container matColumnDef="__actions__">
        <th mat-header-cell *matHeaderCellDef class="actions-header">Actions</th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          @for (action of actions; track action.type) {
            <button
              mat-icon-button
              [ngClass]="getActionClass(action.type)"
              [matTooltip]="action.label"
              (click)="onAction(action.type, row)"
            >
              <mat-icon>{{ getActionIcon(action) }}</mat-icon>
            </button>
          }
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns" class="data-row"></tr>

    <!-- Empty state row -->
    <tr class="mat-row empty-row" *matNoDataRow>
      <td [attr.colspan]="displayedColumns.length">
        <div class="empty-state">
          <mat-icon>inbox</mat-icon>
          <span>No data available</span>
        </div>
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 25]"
    [pageIndex]="currentPage"
    (page)="onPage($event)"
    showFirstLastButtons
  />
</div>
