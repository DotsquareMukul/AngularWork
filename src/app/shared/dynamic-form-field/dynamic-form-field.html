@switch (field.type) {
  @case ('text') {
    <app-text-input [formControlName]="field.name" [label]="field.label" [invalid]="isInvalid" />
  }

  @case ('number') {
    <app-text-input
      [formControlName]="field.name"
      [label]="field.label"
      type="number"
      [invalid]="isInvalid"
    />
  }

  @case ('textarea') {
    <app-text-input
      [formControlName]="field.name"
      [label]="field.label"
      [multiline]="true"
      [rows]="3"
      [invalid]="isInvalid"
    />
  }

  @case ('date') {
    <app-date-picker-field
      [formControlName]="field.name"
      [label]="field.label"
      [invalid]="isInvalid"
    ></app-date-picker-field>
  }

  @case ('select') {
    <app-select-field
      [formControlName]="field.name"
      [label]="field.label"
      [options]="field.options ?? []"
      [invalid]="isInvalid"
    />
  }
}
