<mat-card>
  @if (title || subtitle) {
    <mat-card-header>
      @if (title) {
        <mat-card-title>{{ title }}</mat-card-title>
      }
      @if (subtitle) {
        <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
      }
    </mat-card-header>
  }

  <mat-card-content>
    <ng-content></ng-content>
  </mat-card-content>

  <!-- optional footer slot, e.g. for action buttons -->
  <ng-content select="[card-footer]"></ng-content>
</mat-card>
